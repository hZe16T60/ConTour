<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoLir · невдовзі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'e-ukraine', 'Helvetica', sans-serif;
            background: #000000;
            color: #FFFFFF;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
            filter: invert(1);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            line-height: 1.6;
        }

        .message {
            margin-top: 2rem;
            padding: 1rem;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../images/icon-404.svg" alt="404" class="logo">
        <h1>CoLir</h1>
        <p>Вибач, ми ще не відкрились</p>
        <div class="message">Натисни «Tools» угорі, щоб повернутись до вибору</div>
    </div>
</body>
</html>
