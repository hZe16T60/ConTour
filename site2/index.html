<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcHist</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Власні стилі -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="images/icon-logo2.svg" alt="ArchMap" style="width: 40px; height: 40px;" onerror="this.style.display='none'">
        </div>
        <div class="title">ArcHist</div>
    </header>

    <div class="main">
        <div id="map"></div>

        <div class="sidebar">
            <!-- Пошук місця -->
            <div>
                <div class="section-title">Пошук місця</div>
                <div class="search-container">
                    <input type="text" id="searchInput" class="input-field" placeholder="Наприклад, Львів">
                    <button id="searchBtn" class="btn">
                        <img src="images/icon-search.svg" alt="" style="width:20px; height:20px;"> Знайти
                    </button>
                </div>
                <div id="searchError" class="text-muted"></div>
            </div>

            <!-- Вибір області -->
            <div>
                <div class="section-title">Область пошуку</div>
                <p class="text-muted">Клікніть на карті двічі, щоб встановити прямокутник.</p>
                <div class="coordinates-row">
                    <input type="text" id="lat1" class="input-field" placeholder="Широта 1" readonly>
                    <input type="text" id="lon1" class="input-field" placeholder="Довгота 1" readonly>
                </div>
                <div class="coordinates-row">
                    <input type="text" id="lat2" class="input-field" placeholder="Широта 2" readonly>
                    <input type="text" id="lon2" class="input-field" placeholder="Довгота 2" readonly>
                </div>
                <div style="display: flex; gap: 0.5rem; margin: 1rem 0;">
                    <button id="clearMarkersBtn" class="btn">
                        <img src="images/icon-clear.svg" alt="" style="width:20px; height:20px;"> Прибрати
                    </button>
                    <button id="useMapExtent" class="btn">
                        <img src="images/icon-fullscreen.svg" alt="" style="width:20px; height:20px;"> Весь екран
                    </button>
                </div>
            </div>

            <!-- ЄДИНА КНОПКА ДЛЯ ВСІХ ПАМ'ЯТОК -->
            <button id="fetchAllBtn" class="btn btn-primary" style="margin-top: 8px;">
                🇺🇦 Знайти всі пам'ятки
            </button>

            <!-- Статистика -->
            <div class="stats" id="statsPanel">
                <div class="stat-row"><span>Знайдено об'єктів:</span> <span id="statCount">0</span></div>
                <div class="stat-row"><span>Типів:</span> <span id="statTypes">0</span></div>
            </div>

            <!-- Список пам'яток -->
            <div class="section-title">Список пам'яток</div>
            <div id="monumentsList" class="monuments-list"></div>

            <!-- Експорт -->
            <div class="export-buttons" style="margin-top: 1rem;">
                <button id="exportCSV" class="btn small">
                    <img src="images/icon-svg.svg" alt="" style="width:16px; height:16px;"> CSV
                </button>
                <button id="exportGeoJSON" class="btn small">
                    <img src="images/icon-svg.svg" alt="" style="width:16px; height:16px;"> GeoJSON
                </button>
            </div>

            <div class="footer-links">Дані: OpenStreetMap, Wikidata, Вікіпедія</div>
            <div class="footer-signature">© DEZER 2026</div>
        </div>
    </div>

    <!-- Скрипти -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
